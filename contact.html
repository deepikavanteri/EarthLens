<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contact | EarthLens</title>

    <link rel="stylesheet" href="./contact.css" />
  </head>

  <body>
    <header class="header">
      <a href="index.html" class="logo"> 🌍 <span>EarthLens</span> </a>

      <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html" class="active">About</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" class="login-btn">Login</a>
      </nav>
    </header>

    <section class="contact">
      <div class="contact-container">
        <h1>Contact <span>EarthLens</span></h1>
        <p>Have suggestions or feedback? Feel free to connect with us.</p>

        <form>
          <input type="text" placeholder="Enter your name" />
          <input type="email" placeholder="Enter your email" />
          <textarea placeholder="Write your message"></textarea>
          <button>Send Message</button>
        </form>

        <div class="contact-info">
          <div class="card">
            <h2>📧</h2>
            <h3>Email</h3>
            <p>support@earthlens.com</p>
          </div>

          <div class="card">
            <h2>🌍</h2>
            <h3>Website</h3>
            <p>Explore the world with EarthLens</p>
          </div>

          <div class="card">
            <h2>📍</h2>
            <h3>Location</h3>
            <p>Planet Earth</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
