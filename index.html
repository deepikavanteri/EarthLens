<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EarthLens</title>
    <link rel="stylesheet" href="./index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  </head>
  <body>
    <header>
      <section class="hero">
        <nav class="navbar">
         
            <ul class="nav-links">
              <li><a href="./index.html">Home</a></li>
              <li><a href="./city.html">Explore</a></li>
              <li><a href="./about.html">About</a></li>
              <li><a href="./contact.html">Contact</a></li>
            </ul>
    
          <a  id="login-btn" href="./login.html">Login</a>
        </nav>
        <div class="logo">
          <img src="./images/logo.png" alt="logo" />
        </div>
        <video
          autoplay
          muted
          loop
          id="bgvideo"
          src="./images/video.mp4"
        ></video>
        <div class="overlay"></div>
        <div class="content">
          <h1>Discover.</h1>
          <h1>Explore.</h1>
          <h1>Understand.</h1>
          <h1 id="city">Any City in the World.</h1>
          <p>Search weather, maps, country details and more.</p>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" name="searchbar" placeholder="Search any City...">
            <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> </button>
        </div>
        <div class="popular">
        <span>Popular Searches :</span>
        <button type="button">Tokyo</button>
        <button type="button">Paris</button>
        <button type="button">Dubai</button>
        <button type="button">New York</button>
        <button type="button">London</button>
        </div>
        <div class="card">
              <img src="./images/earth.jpg" alt="">
              <div class="topic">
                <h2>195+</h2>
                <h3>Countries</h3>
                <p>Unlimited Cities One World to Explore</p>
              </div>
        </div>
      </section>
    </header>
    <script src="./script.js"></script>
  </body>
</html>
