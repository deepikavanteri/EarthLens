<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login | EarthLens</title>

    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <header class="login-header">

    <div class="logo">
        🌍 <span>EarthLens</span>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>
    <div class="login-container">
      <div class="login-box">
        <h1>Earth<span>Lens</span></h1>

        <h2>Welcome Back</h2>

        <p>Login to continue exploring the world</p>

        <form action="./index.html">
          <div class="input-box">
            <input type="email" required />

            <label>Email</label>
          </div>

          <div class="input-box">
            <input type="password" required />

            <label>Password</label>
          </div>

          <button>Login</button>

          <p class="signup">
            Don't have an account?
            <a href="#"> Sign Up </a>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
